name: Build Lima APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configure git
        run: |
          git config --global user.email "ci@limenseguridad.com"
          git config --global user.name "Lima CI"

      - name: Inject build number
        run: sed -i "s/__BUILD_NUMBER__/${{ github.run_number }}/g" www/index.html

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android || npx cap add android || npx cap add android

      - name: Sync web files
        run: npx cap sync android

      - name: Add permissions to manifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q 'RECORD_AUDIO' $MANIFEST || sed -i 's|<application|<uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <application|' $MANIFEST
          grep -q 'ACCESS_FINE_LOCATION' $MANIFEST || sed -i 's|<application|<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <application|' $MANIFEST

      - name: Patch MainActivity for permissions, WebView audio and widget intents
        run: |
          MAIN=android/app/src/main/java/com/limenseguridad/lima/MainActivity.java
          echo "" | base64 -d > $MAIN

      - name: Add Lima widgets
        run: |
          PKG=android/app/src/main/java/com/limenseguridad/lima
          RES=android/app/src/main/res
          mkdir -p $RES/xml $RES/layout $RES/drawable

          # Widget metadata (tamaño 4x1 celdas)
          cat > $RES/xml/widget_info.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<appwidget-provider xmlns:android="http://schemas.android.com/apk/res/android"
    android:minWidth="250dp"
    android:minHeight="74dp"
    android:targetCellWidth="4"
    android:targetCellHeight="1"
    android:updatePeriodMillis="0"
    android:initialLayout="@layout/widget_lima"
    android:resizeMode="horizontal|vertical"
    android:widgetCategory="home_screen"/>
EOF

          # Widget background (rounded dark)
          cat > $RES/drawable/widget_bg.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
    <solid android:color="#CC120338"/>
    <corners android:radius="18dp"/>
    <stroke android:width="1dp" android:color="#441A0538"/>
</shape>
EOF

          # Button background rojo (Pedir Ayuda)
          cat > $RES/drawable/widget_btn_red.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
    <solid android:color="#44EF4444"/>
    <corners android:radius="10dp"/>
    <stroke android:width="1dp" android:color="#88EF4444"/>
</shape>
EOF

          # Button background violeta (Escuchar Lima)
          cat > $RES/drawable/widget_btn_purple.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
    <solid android:color="#448B5CF6"/>
    <corners android:radius="10dp"/>
    <stroke android:width="1dp" android:color="#888B5CF6"/>
</shape>
EOF

          # Widget layout
          cat > $RES/layout/widget_lima.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:orientation="vertical"
    android:background="@drawable/widget_bg"
    android:padding="10dp"
    android:gravity="center">
    <TextView
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:text="LIMA · LIMEN SEGURIDAD"
        android:textColor="#80B57BEB"
        android:textSize="8sp"
        android:gravity="center"
        android:paddingBottom="7dp"/>
    <LinearLayout
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:orientation="horizontal">
        <Button
            android:id="@+id/btn_ayuda"
            android:layout_width="0dp"
            android:layout_height="40dp"
            android:layout_weight="1"
            android:text="SOS Ayuda"
            android:textSize="11sp"
            android:textColor="#FFEF4444"
            android:textAllCaps="false"
            android:background="@drawable/widget_btn_red"
            android:layout_marginEnd="5dp"/>
        <Button
            android:id="@+id/btn_escuchar"
            android:layout_width="0dp"
            android:layout_height="40dp"
            android:layout_weight="1"
            android:text="Mic Lima"
            android:textSize="11sp"
            android:textColor="#FFB57BEB"
            android:textAllCaps="false"
            android:background="@drawable/widget_btn_purple"
            android:layout_marginStart="5dp"/>
    </LinearLayout>
</LinearLayout>
EOF

          # LimaWidget.java
          cat > $PKG/LimaWidget.java << 'EOF'
package com.limenseguridad.lima;
import android.app.PendingIntent;
import android.appwidget.AppWidgetManager;
import android.appwidget.AppWidgetProvider;
import android.content.Context;
import android.content.Intent;
import android.widget.RemoteViews;
public class LimaWidget extends AppWidgetProvider {
  public static final String ACTION_AYUDA    = "com.limenseguridad.lima.WIDGET_AYUDA";
  public static final String ACTION_ESCUCHAR = "com.limenseguridad.lima.WIDGET_ESCUCHAR";
  @Override
  public void onUpdate(Context ctx, AppWidgetManager mgr, int[] ids) {
    for (int id : ids) {
      RemoteViews views = new RemoteViews(ctx.getPackageName(), R.layout.widget_lima);
      Intent iAyuda = new Intent(ctx, MainActivity.class);
      iAyuda.setAction(ACTION_AYUDA);
      iAyuda.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_SINGLE_TOP);
      PendingIntent piAyuda = PendingIntent.getActivity(ctx, 1, iAyuda,
        PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
      views.setOnClickPendingIntent(R.id.btn_ayuda, piAyuda);
      Intent iEscuchar = new Intent(ctx, MainActivity.class);
      iEscuchar.setAction(ACTION_ESCUCHAR);
      iEscuchar.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_SINGLE_TOP);
      PendingIntent piEscuchar = PendingIntent.getActivity(ctx, 2, iEscuchar,
        PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
      views.setOnClickPendingIntent(R.id.btn_escuchar, piEscuchar);
      mgr.updateAppWidget(id, views);
    }
  }
}
EOF

          # Registrar el widget en AndroidManifest.xml
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's|</application>|    <receiver android:name=".LimaWidget" android:exported="true">\n      <intent-filter><action android:name="android.appwidget.action.APPWIDGET_UPDATE"/></intent-filter>\n      <meta-data android:name="android.appwidget.provider" android:resource="@xml/widget_info"/>\n    </receiver>\n  </application>|' $MANIFEST

          # launchMode singleTop para que onNewIntent funcione al tocar el widget con la app abierta
          sed -i 's|android:name=".MainActivity"|android:name=".MainActivity" android:launchMode="singleTop"|' $MANIFEST

      - name: Set app icon
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null
          RES=android/app/src/main/res
          # Reemplazar iconos en todos los densities
          for entry in "48 mipmap-mdpi" "72 mipmap-hdpi" "96 mipmap-xhdpi" "144 mipmap-xxhdpi" "192 mipmap-xxxhdpi"; do
            SIZE=$(echo $entry | cut -d' ' -f1)
            DIR=$(echo $entry | cut -d' ' -f2)
            convert assets/icon.png -resize ${SIZE}x${SIZE} $RES/$DIR/ic_launcher.png
            cp $RES/$DIR/ic_launcher.png $RES/$DIR/ic_launcher_round.png
          done
          # Reemplazar foreground del adaptive icon (el que muestra las "TT")
          convert assets/icon.png -resize 108x108 $RES/mipmap-anydpi-v26/ic_launcher_foreground.png 2>/dev/null || true
          # Eliminar adaptive icons (mipmap-anydpi-v26) para que Android use los PNG normales
          rm -rf $RES/mipmap-anydpi-v26

      - name: Setup Android SDK tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget unzip
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools
          mv /tmp/cmdtools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>/dev/null || true
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses 2>/dev/null || true

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LIMA-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: LIMA v${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            APK de LIMA - Asistente IA Limen Seguridad
            Build automatico desde GitHub Actions
          token: ${{ secrets.GITHUB_TOKEN }}
