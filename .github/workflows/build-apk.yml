name: Build Lima APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configure git
        run: |
          git config --global user.email "ci@limenseguridad.com"
          git config --global user.name "Lima CI"

      - name: Inject build number
        run: sed -i "s/__BUILD_NUMBER__/${{ github.run_number }}/g" www/index.html

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android || npx cap add android || npx cap add android

      - name: Sync web files
        run: npx cap sync android

      - name: Add permissions to manifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q 'RECORD_AUDIO' $MANIFEST || sed -i 's|<application|<uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <application|' $MANIFEST
          grep -q 'ACCESS_FINE_LOCATION' $MANIFEST || sed -i 's|<application|<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <application|' $MANIFEST

      - name: Patch MainActivity for permissions, WebView audio and widget intents
        run: |
          MAIN=android/app/src/main/java/com/limenseguridad/lima/MainActivity.java
          echo "" | base64 -d > $MAIN

      - name: Add Lima widgets
        run: |
          PKG=android/app/src/main/java/com/limenseguridad/lima
          RES=android/app/src/main/res
          mkdir -p $RES/xml $RES/layout $RES/drawable
          # Drawables
          echo "" | base64 -d > $RES/drawable/widget_bg.xml
          echo "" | base64 -d > $RES/drawable/widget_circle_red.xml
          echo "" | base64 -d > $RES/drawable/widget_btn_purple.xml
          # Widget info XMLs
          echo "" | base64 -d > $RES/xml/widget_ayuda_info.xml
          echo "" | base64 -d > $RES/xml/widget_escuchar_info.xml
          # Layouts
          echo "" | base64 -d > $RES/layout/widget_ayuda.xml
          echo "" | base64 -d > $RES/layout/widget_escuchar.xml
          # Java classes
          echo "" | base64 -d > $PKG/LimaWidget.java
          echo "" | base64 -d > $PKG/LimaWidgetAyuda.java
          echo "" | base64 -d > $PKG/LimaWidgetEscuchar.java
          echo "" | base64 -d > $PKG/LimaAndroid.java
          echo "" | base64 -d > $PKG/LimaVoiceActivity.java
          # Manifest: registrar los 2 widgets separados
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's|</application>|    <receiver android:name=".LimaWidgetAyuda" android:exported="true">\n      <intent-filter><action android:name="android.appwidget.action.APPWIDGET_UPDATE"/></intent-filter>\n      <meta-data android:name="android.appwidget.provider" android:resource="@xml/widget_ayuda_info"/>\n    </receiver>\n    <receiver android:name=".LimaWidgetEscuchar" android:exported="true">\n      <intent-filter><action android:name="android.appwidget.action.APPWIDGET_UPDATE"/></intent-filter>\n      <meta-data android:name="android.appwidget.provider" android:resource="@xml/widget_escuchar_info"/>\n    </receiver>\n    <activity android:name=".LimaVoiceActivity" android:exported="false" android:theme="@android:style/Theme.Translucent.NoTitleBar" android:launchMode="singleTop"/>\n  </application>|' $MANIFEST

      - name: Set app icon
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null
          RES=android/app/src/main/res
          # Reemplazar iconos en todos los densities
          for entry in "48 mipmap-mdpi" "72 mipmap-hdpi" "96 mipmap-xhdpi" "144 mipmap-xxhdpi" "192 mipmap-xxxhdpi"; do
            SIZE=$(echo $entry | cut -d' ' -f1)
            DIR=$(echo $entry | cut -d' ' -f2)
            convert assets/icon.png -resize ${SIZE}x${SIZE} $RES/$DIR/ic_launcher.png
            cp $RES/$DIR/ic_launcher.png $RES/$DIR/ic_launcher_round.png
          done
          # Reemplazar foreground del adaptive icon (el que muestra las "TT")
          convert assets/icon.png -resize 108x108 $RES/mipmap-anydpi-v26/ic_launcher_foreground.png 2>/dev/null || true
          # Eliminar adaptive icons (mipmap-anydpi-v26) para que Android use los PNG normales
          rm -rf $RES/mipmap-anydpi-v26

      - name: Setup Android SDK tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget unzip
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools
          mv /tmp/cmdtools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>/dev/null || true
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses 2>/dev/null || true

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LIMA-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: LIMA v${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            APK de LIMA - Asistente IA Limen Seguridad
            Build automatico desde GitHub Actions
          token: ${{ secrets.GITHUB_TOKEN }}
