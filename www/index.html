<!DOCTYPE html>
<html lang="es" data-lima-state="violet">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LIMA">
<meta name="theme-color" content="#0d0118">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/img/lima_frente.png">
<title>LIMA · Asistente IA</title>
<style>
:root{
  --bg:#060010;--bg2:#0a0011;--bg3:#100020;
  --border:rgba(139,92,246,.22);
  --p:#8b5cf6;--pL:#c084fc;--pD:#5b21b6;
  --green:#10b981;--red:#ef4444;--orange:#f59e0b;--cyan:#06b6d4;
  --text:#ede9fe;--muted:#7c6ea8;
  --glass:rgba(13,1,24,.55);--glassB:rgba(139,92,246,.18);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  --c-main:#9B30FF;--c-glow:#BF7FFF;--c-dark:#5A0FAA;--c-dim:rgba(155,48,255,0.15);
  --violet-main:#9B30FF;--violet-glow:#BF7FFF;--violet-dark:#5A0FAA;--violet-dim:rgba(155,48,255,0.15);
  --red-main:#FF3A3A;--red-glow:#FF7070;--red-dark:#8B0000;--red-dim:rgba(255,58,58,0.15);
  --green-main:#00FF88;--green-glow:#7FFFCC;--green-dark:#006633;--green-dim:rgba(0,255,136,0.15);
  --amber-main:#FFB800;--amber-glow:#FFD966;--amber-dark:#7A5500;--amber-dim:rgba(255,184,0,0.15);
}
/* Estado via data attribute en html tag — cambia todos los colores */
[data-lima-state="violet"],[data-lima-state="violet"] body { --c-main:#9B30FF;--c-glow:#BF7FFF;--c-dark:#5A0FAA;--c-dim:rgba(155,48,255,0.15); }
[data-lima-state="red"],[data-lima-state="red"] body    { --c-main:#FF3A3A;--c-glow:#FF7070;--c-dark:#8B0000;--c-dim:rgba(255,58,58,0.15); }
[data-lima-state="green"],[data-lima-state="green"] body { --c-main:#00FF88;--c-glow:#7FFFCC;--c-dark:#006633;--c-dim:rgba(0,255,136,0.15); }
[data-lima-state="amber"],[data-lima-state="amber"] body { --c-main:#FFB800;--c-glow:#FFD966;--c-dark:#7A5500;--c-dim:rgba(255,184,0,0.15); }
/* Compatibilidad con sistema antiguo */
body.lima-red   { --c-main:#FF3A3A;--c-glow:#FF7070;--c-dark:#8B0000;--c-dim:rgba(255,58,58,0.15); }
body.lima-green { --c-main:#00FF88;--c-glow:#7FFFCC;--c-dark:#006633;--c-dim:rgba(0,255,136,0.15); }
body.lima-amber { --c-main:#FFB800;--c-glow:#FFD966;--c-dark:#7A5500;--c-dim:rgba(255,184,0,0.15); }
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif}

/* ── LOGIN ── */
#login{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:24px;background:radial-gradient(ellipse at 50% 30%,#1a0538 0%,var(--bg) 65%)}
#login.hide{display:none}
.login-avatar{width:140px;height:140px;position:relative;margin-bottom:16px;border-radius:0}
.login-avatar img{width:100%;height:100%;object-fit:cover;border-radius:8px;border:1px solid rgba(139,92,246,.3)}
.login-avatar::after{content:'';position:absolute;inset:-8px;border-radius:14px;border:1px solid rgba(139,92,246,.2);animation:spin-s 12s linear infinite;pointer-events:none}
@keyframes spin-s{to{transform:rotate(360deg)}}
.login-title{font-size:32px;font-weight:800;letter-spacing:8px;color:var(--pL);margin-bottom:4px}
.login-sub{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:28px}
.login-card{width:100%;max-width:320px;display:flex;flex-direction:column;gap:14px}
.lf{display:flex;flex-direction:column;gap:5px}
.lf label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.lf input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:10px;font-size:14px;outline:none;transition:border-color .2s}
.lf input:focus{border-color:var(--p)}
.btn-login{background:linear-gradient(135deg,var(--pD),var(--p));color:#fff;border:none;padding:13px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.btn-login:disabled{opacity:.5}
#login-err{font-size:12px;color:var(--red);text-align:center;min-height:16px}

/* ── AVATAR FULLSCREEN (removed canvas elements) ── */
#lima-label{display:none}

/* ── HEADER ── */
#header{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:calc(var(--safe-t) + 8px) 16px 8px;
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(to bottom,rgba(13,1,24,.8) 0%,transparent 100%);
  backdrop-filter:blur(4px);
}
#hdr-name{font-size:22px;font-weight:900;letter-spacing:6px;color:var(--c-glow);text-shadow:0 0 20px rgba(192,132,252,.5)}
#hdr-sub{font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
#hdr-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
#estado-badge{display:flex;align-items:center;gap:5px;padding:3px 12px;border-radius:20px;border:1px solid var(--border);background:rgba(13,1,24,.6);backdrop-filter:blur(8px)}
#estado-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:all .4s}
#estado-txt{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);transition:color .4s}
#hdr-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
#hdr-hora{font-size:13px;color:var(--text);font-variant-numeric:tabular-nums}
#hdr-usuario{font-size:9px;color:var(--p)}
#btn-settings{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;width:44px;height:44px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;margin-top:4px;touch-action:manipulation;-webkit-user-select:none;user-select:none}
#btn-settings:active{background:var(--glassB)}
#btn-logout{background:none;border:1px solid rgba(239,68,68,.3);color:rgba(239,68,68,.7);border-radius:8px;width:44px;height:44px;cursor:pointer;font-size:20px;font-weight:bold;display:flex;align-items:center;justify-content:center;margin-top:4px;touch-action:manipulation;-webkit-user-select:none;user-select:none}
#btn-logout:active{background:rgba(239,68,68,.15);color:var(--red)}

body.st-armado    #estado-dot{background:var(--red);box-shadow:0 0 8px var(--red)}
body.st-armado    #estado-txt{color:var(--red)}
body.st-armado    #estado-badge{border-color:rgba(239,68,68,.4)}
body.st-desarmado #estado-dot{background:var(--green);box-shadow:0 0 8px var(--green)}
body.st-desarmado #estado-txt{color:var(--green)}
body.st-desarmado #estado-badge{border-color:rgba(16,185,129,.4)}
body.st-panico    #estado-dot{background:var(--orange);animation:blink-d .5s infinite alternate}
body.st-panico    #estado-txt{color:var(--orange)}
body.st-bloqueado #estado-dot{background:var(--cyan)}
body.st-bloqueado #estado-txt{color:var(--cyan)}
@keyframes blink-d{from{opacity:.4}to{opacity:1}}

/* ── SIDE BUTTONS ── */
.side-col{
  position:fixed;top:0;bottom:0;
  z-index:20;display:flex;flex-direction:column;
  justify-content:space-evenly;
  padding:72px 0 195px;
  pointer-events:none; /* allow header clicks through the transparent col area */
}
#side-left{left:6px}
#side-right{right:6px;align-items:flex-end}

.sbtn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  width:68px;height:72px;border-radius:14px;
  border:1px solid rgba(155,48,255,.22);
  background:rgba(0,0,16,.65);
  backdrop-filter:blur(14px);
  color:rgba(155,48,255,.6);cursor:pointer;
  transition:all .22s;user-select:none;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 0 8px rgba(155,48,255,.08),inset 0 0 12px rgba(155,48,255,.04);
  pointer-events:auto; /* re-enable pointer events on actual buttons */
}
.sbtn:active{transform:scale(.88) !important;background:var(--c-dim)}
.sbtn .ico{font-size:22px;line-height:1;filter:drop-shadow(0 0 4px var(--c-dim))}
.sbtn .lbl{font-size:6.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;text-align:center;line-height:1.2;color:rgba(191,127,255,.8)}
.sbtn:hover,.sbtn.active{
  border-color:var(--c-main);background:var(--c-dim);
  color:var(--c-main);box-shadow:0 0 20px var(--c-dim),inset 0 0 10px var(--c-dim);
}
.sbtn.panic-btn{border-color:rgba(239,68,68,.4);color:rgba(239,68,68,.8)}
.sbtn.panic-btn .lbl{color:rgba(255,150,150,.8)}
.sbtn.panic-btn:hover,.sbtn.panic-btn.active{
  background:rgba(239,68,68,.18);border-color:var(--red);
  color:var(--red);box-shadow:0 0 20px rgba(239,68,68,.4)
}
.sbtn.locked{opacity:.22;pointer-events:none}
.alarma-status{font-size:5.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;padding:1px 4px;border-radius:4px;transition:all .4s;background:var(--c-dim);color:var(--c-main);border:1px solid rgba(155,48,255,.2)}
.alarma-status.arm{background:rgba(239,68,68,.18);color:#f87171;border-color:rgba(239,68,68,.5)}
.alarma-status.des{background:rgba(16,185,129,.15);color:#34d399;border-color:rgba(16,185,129,.5)}
.alarma-status.pan{background:rgba(245,158,11,.18);color:#fbbf24;border-color:rgba(245,158,11,.5);animation:blink-d .5s infinite alternate}

/* Estado LIMA label debajo del centro */
#lima-state-lbl{
  position:fixed;z-index:20;
  bottom:calc(var(--safe-b) + 165px);
  left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);text-shadow:0 1px 8px rgba(0,0,0,.8);
  transition:color .3s;pointer-events:none;
  white-space:nowrap;
}
#lima-state-lbl.speaking{color:var(--pL)}
#lima-state-lbl.listening{color:var(--cyan)}

/* ── CHAT PANEL — fijo en fondo, transparente ── */
#chat-panel{
  position:fixed;left:0;right:0;bottom:0;z-index:25;
  display:flex;flex-direction:column;
  background:rgba(8,0,16,.28);
  backdrop-filter:blur(6px);
  border-top:1px solid rgba(139,92,246,.12);
  padding-bottom:var(--safe-b);
}

#chat-topbar{
  flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:4px 12px 3px;border-bottom:1px solid rgba(139,92,246,.1);
}
#chat-topbar-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);flex:1}
#btn-tts{font-size:9px;color:var(--muted);background:none;border:1px solid rgba(139,92,246,.2);cursor:pointer;padding:2px 7px;border-radius:6px}
#btn-tts.on{border-color:var(--p);color:var(--pL)}
#btn-clear{font-size:9px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 6px}
#btn-clear:active{color:var(--red)}

/* Chat: altura fija ~3 mensajes, sin expandir */
#chat{
  height:90px;
  overflow-y:auto;
  padding:5px 12px 3px;
  display:flex;flex-direction:column;gap:4px;
  scrollbar-width:none;
}
#chat::-webkit-scrollbar{display:none}
.msg{display:flex;gap:6px;max-width:88%;animation:msgIn .2s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.lima{align-self:flex-start}
.msg-av{width:22px;height:22px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;overflow:hidden}
.msg.lima .msg-av{background:linear-gradient(135deg,var(--pD),var(--p))}
.msg.lima .msg-av img{width:100%;height:100%;object-fit:cover}
.msg.user .msg-av{background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
.msg-inner{max-width:100%;display:flex;flex-direction:column;gap:2px}
.msg-bubble{padding:5px 10px;border-radius:10px;font-size:11px;line-height:1.4}
.msg.user .msg-bubble{background:rgba(91,33,182,.55);color:#fff;border-bottom-right-radius:3px}
.msg.lima .msg-bubble{background:rgba(20,5,40,.5);border:1px solid rgba(139,92,246,.15);color:var(--text);border-bottom-left-radius:3px}
.msg.lima.intent-activar   .msg-bubble{border-color:rgba(239,68,68,.4)}
.msg.lima.intent-desactivar .msg-bubble{border-color:rgba(16,185,129,.4)}
.msg.lima.intent-panico    .msg-bubble{border-color:rgba(245,158,11,.5)}
.msg-time{font-size:8px;color:var(--muted);padding:0 4px}
.msg.user .msg-time{text-align:right}
#typing{align-self:flex-start;display:none;gap:6px;padding:2px 0}
#typing.show{display:flex}
.typing-av{width:22px;height:22px;border-radius:6px;overflow:hidden;flex-shrink:0}
.typing-av img{width:100%;height:100%;object-fit:cover}
.typing-dots{display:flex;align-items:center;gap:4px;background:rgba(28,10,53,.9);border:1px solid var(--border);border-radius:12px;border-bottom-left-radius:3px;padding:8px 12px}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--p);display:block;animation:dot .9s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
#chat-empty{align-self:center;text-align:center;padding:16px 0;color:var(--muted);font-size:12px;letter-spacing:1px}

/* ── INPUT BAR ── */
#input-bar{
  flex-shrink:0;display:flex;gap:8px;padding:6px 12px 8px;
  border-top:1px solid rgba(139,92,246,.1);
  background:transparent;
  align-items:flex-end;
}
#inp{flex:1;background:rgba(20,5,40,.45);border:1px solid rgba(139,92,246,.25);color:var(--text);padding:8px 12px;border-radius:10px;font-size:13px;outline:none;resize:none;max-height:80px;overflow-y:auto;transition:border-color .2s;font-family:inherit;line-height:1.4}
#inp:focus{border-color:var(--p)}
#inp::placeholder{color:var(--muted)}
.ibtn{width:40px;height:40px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s;flex-shrink:0}
#btn-send{background:linear-gradient(135deg,var(--pD),var(--p));color:#fff}
#btn-send:disabled{opacity:.4}
#btn-mic-in{background:rgba(20,5,40,.45);border:1px solid rgba(139,92,246,.25);color:var(--muted)}
#btn-mic-in.recording{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red);animation:blink-d .6s infinite alternate}
#btn-chat-toggle{background:rgba(28,10,53,.8);border:1px solid var(--border);color:var(--muted)}
#btn-chat-toggle.open{border-color:var(--p);color:var(--pL)}

/* ── PIN ── */
#pin-overlay{position:fixed;inset:0;z-index:500;background:rgba(13,1,24,.92);backdrop-filter:blur(12px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#pin-overlay.show{display:flex}
#pin-title{font-size:13px;letter-spacing:2px;color:var(--pL);text-transform:uppercase}
#pin-dots{display:flex;gap:12px}
.pin-dot{width:13px;height:13px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);transition:all .2s}
.pin-dot.filled{background:var(--p);border-color:var(--p);box-shadow:0 0 8px var(--p)}
#pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:210px}
.pin-key{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:15px;font-size:18px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s}
.pin-key:active{background:rgba(139,92,246,.2);border-color:var(--p)}
#pin-cancel{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:6px 16px;letter-spacing:1px;text-transform:uppercase}
#pin-err{font-size:12px;color:var(--red);min-height:16px;letter-spacing:1px}

/* ── MOD PANEL ── */
#mod-panel{position:fixed;inset:0;z-index:800;background:rgba(13,1,24,.96);backdrop-filter:blur(12px);display:none;flex-direction:column;padding:24px;gap:14px;overflow-y:auto}
#mod-panel.show{display:flex}
.mod-list{display:flex;flex-direction:column;gap:10px}
.mod-item{display:flex;align-items:center;gap:14px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px}
.mod-ico{font-size:22px;width:34px;text-align:center}
.mod-info{flex:1}
.mod-name{font-size:13px;font-weight:600;color:var(--text)}
.mod-desc{font-size:11px;color:var(--muted);margin-top:2px}
.mod-badge{padding:2px 9px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.mod-badge.on{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.4);color:var(--green)}
.mod-badge.off{background:var(--bg);border:1px solid var(--border);color:var(--muted)}
#mod-close{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:12px;cursor:pointer;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-top:auto}

/* ── PANEL MÓDULO ── */
#modulo-panel{
  position:fixed;inset:0;z-index:600;
  background:rgba(8,0,16,.92);backdrop-filter:blur(16px);
  display:none;flex-direction:column;
  padding:0;overflow:hidden;
}
#modulo-panel.show{display:flex}
#modulo-header{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 14px;
  border-bottom:1px solid var(--border);
  background:rgba(28,10,53,.6);
}
#modulo-titulo{font-size:16px;font-weight:700;color:var(--pL);letter-spacing:2px;text-transform:uppercase}
#modulo-header button{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
#modulo-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}

/* Tarjetas dentro del panel */
.mod-card{background:rgba(28,10,53,.7);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:8px}
.mod-card-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.mod-estado-badge{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.mod-estado-badge.armado{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:var(--red)}
.mod-estado-badge.desarmado{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.4);color:var(--green)}
.mod-estado-badge.desconocido{background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
.mod-estado-badge.alarma{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);color:var(--orange)}
.mod-evento-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(139,92,246,.08);font-size:12px}
.mod-evento-row:last-child{border-bottom:none}
.mod-evento-fecha{color:var(--muted);flex-shrink:0;font-size:10px;margin-top:1px}
.mod-evento-desc{color:var(--text);flex:1;line-height:1.4}
.mod-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.mod-value{font-size:15px;font-weight:700;color:var(--text)}
.mod-value.online{color:var(--green)}
.mod-value.offline{color:var(--muted)}
.mod-btn{background:linear-gradient(135deg,var(--pD),var(--p));color:#fff;border:none;border-radius:10px;padding:12px;cursor:pointer;font-size:13px;font-weight:700;letter-spacing:1px;width:100%}
.mod-btn:active{opacity:.8}
.mod-btn.danger{background:linear-gradient(135deg,#991b1b,var(--red))}
.mod-btn.secondary{background:rgba(139,92,246,.2);border:1px solid var(--border);color:var(--pL)}
.mod-spinner{text-align:center;padding:40px;color:var(--muted);font-size:13px;letter-spacing:1px}
.mod-error{text-align:center;padding:30px;color:var(--red);font-size:13px}
.ha-device{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(139,92,246,.08)}
.ha-device:last-child{border-bottom:none}
.ha-device-name{flex:1;font-size:13px;color:var(--text)}
.ha-device-domain{font-size:10px;color:var(--muted);margin-top:2px}
.ha-toggle{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.ha-toggle.on{background:var(--p)}
.ha-toggle.off{background:rgba(139,92,246,.2);border:1px solid var(--border)}
.ha-toggle::after{content:'';position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}
.ha-toggle.on::after{left:23px}
.ha-toggle.off::after{left:3px}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--safe-b) + 70px);left:50%;transform:translateX(-50%);background:rgba(28,10,53,.95);border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:13px;z-index:900;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;backdrop-filter:blur(10px)}
#toast.show{opacity:1}
#toast.t-ok{border-color:rgba(16,185,129,.4);color:var(--green)}
#toast.t-err{border-color:rgba(239,68,68,.4);color:var(--red)}

/* PANEL PANICO */
#panic-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.panic-opt{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:20px 10px;border-radius:16px;
  border:1px solid rgba(239,68,68,.25);background:rgba(239,68,68,.06);
  cursor:pointer;transition:all .18s;user-select:none;
}
.panic-opt:active{transform:scale(.92)}
.panic-opt svg{width:38px;height:38px;flex-shrink:0}
.panic-opt span{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);font-weight:700;text-align:center;line-height:1.4}
.panic-opt.p-sonoro    {border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.08)}
.panic-opt.p-silencioso{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.08)}
.panic-opt.p-fuego     {border-color:rgba(249,115,22,.4);background:rgba(249,115,22,.08)}
.panic-opt.p-ayuda     {border-color:rgba(99,102,241,.4);background:rgba(99,102,241,.08)}
.panic-opt.p-sonoro:active    {background:rgba(239,68,68,.2)}
.panic-opt.p-silencioso:active{background:rgba(245,158,11,.2)}
.panic-opt.p-fuego:active     {background:rgba(249,115,22,.2)}
.panic-opt.p-ayuda:active     {background:rgba(99,102,241,.2)}

/* -- LOGIN SPHERE -- */
.login-sphere{position:relative;width:120px;height:120px;margin-bottom:8px;flex-shrink:0}
.ls-core{position:absolute;inset:10px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#BF7FFF,#9B30FF 45%,#5A0FAA 80%,#2e1065);box-shadow:0 0 30px rgba(155,48,255,.7),0 0 60px rgba(155,48,255,.3);animation:ls-pulse 3s ease-in-out infinite}
.ls-ring{position:absolute;border-radius:50%;border:1px solid rgba(155,48,255,.4);animation:ls-spin 8s linear infinite}
.ls-ring.r1{inset:2px;animation-duration:8s}
.ls-ring.r2{inset:-4px;border-color:rgba(191,127,255,.25);animation-duration:14s;animation-direction:reverse}
.ls-glow{position:absolute;inset:-15px;border-radius:50%;background:radial-gradient(circle,rgba(155,48,255,.15) 0%,transparent 70%);animation:ls-pulse 3s ease-in-out infinite}
@keyframes ls-pulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.06);opacity:1}}
@keyframes ls-spin{to{transform:rotate(360deg)}}
.login-build{font-size:9px;color:rgba(155,48,255,.5);letter-spacing:2px;margin-bottom:20px;text-transform:uppercase}
.login-avatar{display:none}

/* ── ORB SYSTEM V3 ── */
#bg-rings{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:visible;width:100%;height:100%}
#lima-orb-wrap{position:fixed;inset:0;z-index:1;pointer-events:none;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#bg-state-glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 45%,var(--c-dim) 0%,transparent 60%);transition:all 0.8s ease;pointer-events:none}
#orb-shield-svg{position:absolute;width:260px;height:286px;opacity:1;pointer-events:none;transition:all 0.6s ease}
#lima-orb{
  position:relative;
  width:200px;height:200px;
  display:flex;align-items:center;justify-content:center;
}

/* Glow layers */
.orb-glow-out{
  position:absolute;inset:-36px;border-radius:50%;
  background:radial-gradient(circle,var(--c-main)30 0%,var(--c-main)12 40%,transparent 72%);
  filter:blur(8px);
  animation:orbPulse 2.5s ease-in-out infinite;
  transition:all 0.6s;
}
.orb-glow-in{
  position:absolute;inset:56px;border-radius:50%;
  background:radial-gradient(circle,var(--c-glow)88 0%,var(--c-main)44 50%,transparent 100%);
  filter:blur(6px);
  animation:orbPulse 2.5s ease-in-out infinite 0.3s;
  transition:all 0.6s;
}

/* Ripple waves */
.orb-ripple{
  position:absolute;width:200px;height:200px;border-radius:50%;
  border:1px solid var(--c-main);opacity:0;
  animation:orbRipple 2.5s ease-out infinite;
  transition:border-color 0.6s;
}
.orb-ripple:nth-child(2){animation-delay:0.5s;animation-duration:3s}
.orb-ripple:nth-child(3){animation-delay:1s;animation-duration:3.5s}

/* SVG rings overlay */
.orb-rings-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.orb-eye-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}

/* Particles */
.orb-particles{position:absolute;inset:0}
.particle{
  position:absolute;
  border-radius:50%;
  animation:particleSpin var(--dur,4s) linear infinite;
  animation-delay:var(--delay,0s);
  left:50%;top:50%;
  width:calc(var(--r,50px)*2);height:calc(var(--r,50px)*2);
  margin-left:calc(-1*var(--r,50px));
  margin-top:calc(-1*var(--r,50px));
}
.particle-dot{
  position:absolute;top:0;left:50%;
  width:var(--sz,4px);height:var(--sz,4px);
  border-radius:50%;
  transform:translateX(-50%) translateY(-50%);
  background:var(--dot-color,#fff);
  opacity:0.85;
  box-shadow:0 0 4px var(--dot-color,#fff);
}
.particle-dot2{
  position:absolute;bottom:0;left:50%;
  width:var(--sz,4px);height:var(--sz,4px);
  border-radius:50%;
  transform:translateX(-50%) translateY(50%);
  background:var(--dot-color,#fff);
  opacity:0.5;
  box-shadow:0 0 3px var(--dot-color,#fff);
}

/* State animations */
body.lima-active .orb-glow-out{animation-duration:0.9s}
body.lima-active .orb-ripple{animation-duration:1.5s}
body.lima-active .orb-ripple:nth-child(2){animation-duration:1.8s}
body.lima-active .orb-ripple:nth-child(3){animation-duration:2.1s}

@keyframes orbPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
@keyframes orbRipple{0%{transform:scale(0.8);opacity:0.6}100%{transform:scale(2.4);opacity:0}}
@keyframes particleSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes arcSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes arcSpinRev{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes glowPulse{0%,100%{opacity:0.3}50%{opacity:0.8}}
</style>
</head>

<script>
// ════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════
const API_BASE = 'https://limaguard.ldtp.com'
const API = API_BASE + '/comando'
const TK  = 'lima_token'
const UK  = 'lima_user'
const MK  = 'lima_mods'

const IMGS = {}  // imágenes reemplazadas por esfera de partículas

const ALL_MODS = [
  {id:'alarma',  ico:'🔔', name:'Alarma',    desc:'Control de armado y zonas'},
  {id:'gps',     ico:'📍', name:'GPS',       desc:'Seguimiento de vehículos'},
  {id:'casa',    ico:'🏠', name:'Hogar',     desc:'Control del hogar'},
  {id:'camara',  ico:'📷', name:'Cámara',    desc:'Monitoreo de cámaras'},
  {id:'notif',   ico:'🔔', name:'Alertas',   desc:'Notificaciones y eventos'},
  {id:'edificio',ico:'🏢', name:'Edificio',  desc:'Acceso y control de edificio'},
]

// Comandos por botón
const BTN_CMDS = {
  alarma:   '¿Cuál es el estado de mi alarma?',
  hogar:    '¿Cuál es el estado de mi hogar?',
  gps:      '¿Dónde está mi vehículo?',
  edificio: '¿Cuál es el estado de mi edificio?',
}

const getToken   = () => localStorage.getItem(TK)
const getUsuario = () => { try { return JSON.parse(localStorage.getItem(UK)||'null') } catch { return null } }
const getMods    = () => { try { return JSON.parse(localStorage.getItem(MK)||'[]') } catch { return [] } }

// ════════════════════════════════════════════════════
//  AVATAR — ORB V3 (CSS/SVG, no canvas)
// ════════════════════════════════════════════════════
const limaLbl  = document.getElementById('lima-label')

function setAvatarState(state) {
  avatarState = state
  const lbl   = document.getElementById('lima-state-lbl')
  clearTimeout(blinkTimer)
  clearTimeout(glanceTimer)
  blinkLocked = false

  const labels = {
    idle:       'En espera',
    listening:  'Escuchando...',
    speaking:   'Respondiendo...',
    processing: 'Procesando...',
    correcto:   'Código correcto',
    error:      'Error',
  }
  if (limaLbl) limaLbl.textContent = labels[state] || ''
  if (lbl) {
    lbl.textContent = labels[state] || ''
    lbl.className   = (state==='speaking'||state==='processing'||state==='error') ? 'speaking' : (state==='listening' ? 'listening' : '')
  }

  switch(state) {
    case 'idle':
      scheduleBlink()
      scheduleGlance()
      break
    case 'correcto':
    case 'error':
      setTimeout(() => setAvatarState('idle'), 3000)
      break
  }
}

// Blink y glance son no-ops visuales pero mantenemos los timers para compatibilidad
function triggerBlink() {
  if (blinkLocked) return
  blinkLocked = true
  setTimeout(() => { blinkLocked = false }, 300)
}

function scheduleBlink() {
  clearTimeout(blinkTimer)
  blinkTimer = setTimeout(() => {
    if (avatarState === 'idle') triggerBlink()
    scheduleBlink()
  }, 3000 + Math.random() * 5000)
}

function scheduleGlance() {
  clearTimeout(glanceTimer)
  glanceTimer = setTimeout(() => {
    scheduleGlance()
  }, 5000 + Math.random() * 6000)
}

// ════════════════════════════════════════════════════
//  ORB V3 — inicialización de partículas
// ════════════════════════════════════════════════════
function initOrb() {
  const container = document.getElementById('orb-particles');
  if (!container) return;
  const orbitFactors = [0.5,0.75,1.1,1.6,2.2,3.0,4.0,5.2,6.6,0.6,0.9,1.4,1.9,2.7,3.6,4.8,6.0,7.5];
  const durations   = [3,4,5,7,9,12,16,20,25,3.5,4.5,6,8,10,14,18,22,28];
  const sizes       = [4.5,4.5,4.5,3.5,3.5,3.5,3,3,3,4.5,4.5,3.5,3.5,3,3,2.5,2.5,2.5];
  const colors      = ['#fff','var(--c-glow)','var(--c-main)'];
  orbitFactors.forEach((f,i) => {
    const r = Math.round(f * 100);
    const sz = sizes[i] || 3;
    const col = colors[i % 3];
    const delay = -(Math.random() * durations[i]);
    const div = document.createElement('div');
    div.className = 'particle';
    div.style.cssText = `--r:${r}px;--dur:${durations[i]}s;--delay:${delay.toFixed(2)}s;--sz:${sz}px;--dot-color:${col}`;
    div.innerHTML = `<div class="particle-dot"></div><div class="particle-dot2"></div>`;
    container.appendChild(div);
  });
}

function setLimaState(state) {
  // Sistema principal: data-lima-state en html tag (cambia todos los CSS vars)
  document.documentElement.dataset.limaState = state || 'violet';
  // Compatibilidad: también actualiza body classes
  document.body.classList.remove('lima-red','lima-green','lima-amber','lima-active');
  if (state === 'red')   { document.body.classList.add('lima-red','lima-active'); }
  if (state === 'green') { document.body.classList.add('lima-green','lima-active'); }
  if (state === 'amber') { document.body.classList.add('lima-amber','lima-active'); }
  // Actualizar label de estado del orbe
  const lbl = document.getElementById('lima-state-lbl');
  if (lbl) {
    const labels = { violet:'◈ procesando', red:'⚠ alerta activa', green:'✓ sistema OK', amber:'◈ hogar activo' };
    lbl.textContent = labels[state] || '◈ procesando';
  }
}

// ════════════════════════════════════════════════════
//  ESTADO SISTEMA
// ════════════════════════════════════════════════════
function setEstado(estado, label) {
  // Preserve non-alarm body classes (lima-red, lima-green, etc.) — only update st-* class
  document.body.classList.remove('st-armado','st-desarmado','st-panico','st-bloqueado')
  document.body.classList.add('st-' + estado)
  document.getElementById('estado-txt').textContent = label.toUpperCase()
  const aS = document.getElementById('alarma-status')
  if (aS) {
    aS.className = 'alarma-status'
    if (estado === 'armado')    { aS.classList.add('arm'); aS.textContent = '● ARMADO' }
    else if (estado === 'desarmado') { aS.classList.add('des'); aS.textContent = '● DESARMADO' }
    else if (estado === 'panico')    { aS.classList.add('pan'); aS.textContent = '⚠ PÁNICO' }
    else { aS.textContent = '—' }
  }
  // Update orb state color — armado (standby) keeps violet, only active events go red
  if (estado === 'panico') setLimaState('red')
  else if (estado === 'desarmado') {
    setLimaState('green')
    setTimeout(() => setLimaState('violet'), 3000)
  }
  else if (estado === 'armado') { /* keep current orb color — standby armed is not an emergency */ }
  else setLimaState('violet')
}

function addMsg(texto, lado, intent) {
  document.getElementById('chat-empty').style.display = 'none'
  const wrap = document.createElement('div')
  wrap.className = `msg ${lado}` + (intent ? ` intent-${intent}` : '')
  const av = document.createElement('div'); av.className = 'msg-av'
  if (lado === 'lima') { av.style.background='linear-gradient(135deg,#7c3aed,#4f46e5)'; av.textContent='L'; av.style.cssText+=';color:#fff;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center' }
  else av.textContent = '👤'
  const inner = document.createElement('div'); inner.className = 'msg-inner'
  const bub = document.createElement('div'); bub.className = 'msg-bubble'; bub.textContent = texto
  const tm  = document.createElement('div'); tm.className = 'msg-time'; tm.textContent = ahora()
  inner.appendChild(bub); inner.appendChild(tm)
  wrap.appendChild(av); wrap.appendChild(inner)
  chatEl.insertBefore(wrap, typingEl)
  requestAnimationFrame(() => { chatEl.scrollTop = chatEl.scrollHeight })
}

async function confirmarCambioPass() {
  const currentPassword = document.getElementById('cp-actual')?.value || ''
  const newPassword     = document.getElementById('cp-nueva')?.value  || ''
  const errEl = document.getElementById('cp-err')
  if (!currentPassword || !newPassword) { if(errEl) errEl.textContent = 'Completá ambos campos'; return }
  if (newPassword.length < 6)            { if(errEl) errEl.textContent = 'Mínimo 6 caracteres'; return }
  if (errEl) errEl.textContent = ''
  try {
    const r = await fetch(API_BASE + '/api/usuario/password', {
      method: 'PUT',
      headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + (getToken() || '') },
      body: JSON.stringify({ currentPassword, newPassword })

    const d = await r.json()
    if (!r.ok || !d.ok) { if(errEl) errEl.textContent = d.error || 'Error'; return }
    cerrarModulo()
    toast('Contraseña actualizada', 'ok')
  } catch { if(errEl) errEl.textContent = 'Error de conexión' }
}

// ════════════════════════════════════════════════════
//  AUDIO (beeps)
// ════════════════════════════════════════════════════
const AC = window.AudioContext || window.webkitAudioContext
let actx
function beep(f=660,d=.08,v=.18) {
  if(!actx) actx = new AC()
  const o=actx.createOscillator(),g=actx.createGain()
  o.connect(g);g.connect(actx.destination)
  o.frequency.value=f;g.gain.setValueAtTime(v,actx.currentTime)
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d)
  o.start();o.stop(actx.currentTime+d)
}
function beepOk()    { beep(660,.07);setTimeout(()=>beep(880,.09),100) }
function beepErr()   { beep(220,.25,.3) }
function beepAlarm() { beep(880,.1);setTimeout(()=>beep(880,.1),150);setTimeout(()=>beep(1100,.2),300) }
function beepPanic() { for(let i=0;i<5;i++) setTimeout(()=>beep(1200,.1,.4),i*120) }

// ════════════════════════════════════════════════════
//  RESPUESTA IA
// ════════════════════════════════════════════════════
let bloqueado = false

function handleRespuesta(data) {
  setTyping(false)
  btnSend.disabled = false
  const intent = data.intent || 'desconocido'
  addMsg(data.respuesta, 'lima', intent)
  // Mostrar animación según resultado
  if (data.intent === 'desactivar' || data.intent === 'activar' || data.intent === 'armar_parcial') {
    if (data.esperandoPin) {
      // nada, ya está en speaking
    }
  }
  if (data.intent && data.intent.includes('correcto') || (data.respuesta && data.respuesta.toLowerCase().includes('código correcto'))) {
    setTimeout(() => setAvatarState('correcto'), 200)
  } else if (data.intent === 'pin_incorrecto' || data.intent === 'bloqueado' || data.intent === 'error') {
    setTimeout(() => setAvatarState('error'), 200)
  }
  hablarRespuesta(data.respuesta)
  if (!ttsEnabled) setAvatarState('idle')
  if (data.esperandoPin) { mostrarPin(); return }
  switch(intent) {
    case 'activar':
      setEstado('armado','Armado'); beepAlarm()
      break
    case 'desactivar':
      setEstado('desarmado','Desarmado'); beepOk()
      break
    case 'panico':
      setEstado('panico','PÁNICO'); beepPanic()
      if(navigator.vibrate) navigator.vibrate([300,100,300,100,300])
      break
    case 'bloqueado':
      setEstado('bloqueado','Bloqueado'); beepErr()
      bloqueado = true
      setTimeout(()=>{ bloqueado=false; setEstado('desarmado','Desarmado') }, 60000)
      break
    case 'error': beepErr(); break
    default: if(data.respuesta) beepOk()
  }
}

// ════════════════════════════════════════════════════
//  ENVIAR
// ════════════════════════════════════════════════════
async function enviar() {
  const texto = inp.value.trim()
  if (!texto || bloqueado) return
  addMsg(texto, 'user')
  inp.value = ''; inp.style.height = 'auto'
  setTyping(true); btnSend.disabled = true
  setAvatarState('processing')
  const u = getUsuario()
  try {
    const r = await fetch(API, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+(getToken()||'')},
      body: JSON.stringify({ texto, usuario: u?.nombre || 'usuario' })
    })
    const d = await r.json()
    if (r.status === 401) { logout(); return }
    handleRespuesta(d)
  } catch {
    setTyping(false); btnSend.disabled=false; setAvatarState('idle')
    addMsg('Error de conexión con LIMA.','lima','error'); beepErr()
  }
}

// ── MI ALARMA ─────────────────────────────────────
async function abrirModuloAlarma() {
  _abrirModulo('🔔 Mi Alarma')
  try {
    const hdr = { Authorization: 'Bearer ' + (getToken() || '') }
    const [r, rb] = await Promise.all([
      fetch(API_BASE + '/api/modulo/alarma', { headers: hdr }),
      fetch(API_BASE + '/api/modulo/alarma/bridge', { headers: hdr })
    ])
    const d  = await r.json()
    const br = rb.ok ? await rb.json() : { online: false, panel_estado: 'desconocido' }
    if (!d.ok) {
      document.getElementById('modulo-body').innerHTML = `<div class="mod-error">${d.error || 'Sin datos'}</div>`
      return
    }
    const ec = d.estado === 'armado' ? 'armado'
             : d.estado === 'desarmado' ? 'desarmado'
             : (d.estado === 'alarma' || d.estado === 'panico') ? 'alarma'
             : 'desconocido'
    const el = { armado:'Armado', desarmado:'Desarmado', alarma:'ALARMA', panico:'PÁNICO', desconocido:'Desconocido' }[d.estado] || d.estado
    const evHtml = (d.eventos || []).map(ev => {
      const f = ev.fecha ? new Date(ev.fecha).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : ''
      return `<div class="mod-evento-row">
        <div class="mod-evento-fecha">${f}</div>
        <div class="mod-evento-desc">${ev.descripcion || ev.zona || '—'}</div>
      </div>`
    }).join('')
    const bridgeHtml = br.online
      ? `<div class="mod-card" style="gap:10px">
          <div class="mod-label" style="margin-bottom:2px">Control del panel</div>
          <div style="display:flex;gap:8px">
            <button class="mod-btn danger" style="flex:1" onclick="comandoAlarma('armar')">🔒 Armar</button>
            <button class="mod-btn" style="flex:1;background:linear-gradient(135deg,#065f46,#10b981)" onclick="comandoAlarma('desarmar')">🔓 Desarmar</button>
          </div>
          <button class="mod-btn secondary" onclick="comandoAlarma('parcial')">🏠 Armado Parcial</button>
        </div>`
      : `<div class="mod-card" style="text-align:center;padding:12px">
          <div style="font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase">Panel no conectado</div>
          <div style="font-size:10px;color:var(--muted);margin-top:4px">Bridge offline — instalar dispositivo LIMA Bridge</div>
        </div>`
    document.getElementById('modulo-body').innerHTML = `
      <div class="mod-card">
        <div class="mod-card-row">
          <div><div class="mod-label">Estado actual</div></div>
          <div class="mod-estado-badge ${ec}">${el}</div>
        </div>
      </div>
      ${bridgeHtml}
      ${d.eventos?.length ? `<div class="mod-card">
        <div class="mod-label" style="margin-bottom:6px">Últimos eventos</div>
        ${evHtml}
      </div>` : ''}
    `
    if (d.estado === 'armado') setEstado('armado','Armado')
    else if (d.estado === 'desarmado') setEstado('desarmado','Desarmado')
    else if (d.estado === 'alarma' || d.estado === 'panico') setEstado('panico', el)
  } catch {
    document.getElementById('modulo-body').innerHTML = '<div class="mod-error">Error de conexión</div>'
  }
}

async function comandoAlarma(accion) {
  const btns = document.querySelectorAll('#modulo-body .mod-btn')
  btns.forEach(b => { b.disabled = true; b.style.opacity = '0.5' })
  try {
    const r = await fetch(API_BASE + '/api/modulo/alarma/comando', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + (getToken() || '') },
      body: JSON.stringify({ accion })
    })
    const d = await r.json()
    if (!d.ok) {
      alert(d.error || 'Error al enviar comando')
      btns.forEach(b => { b.disabled = false; b.style.opacity = '' })
      return
    }
    setTimeout(() => abrirModuloAlarma(), 1500)
  } catch {
    alert('Error de conexión')
    btns.forEach(b => { b.disabled = false; b.style.opacity = '' })
  }
}

// ── MI GPS ────────────────────────────────────────
async function abrirModuloGPS() {
  _abrirModulo('📍 Mi GPS')

    const r = await fetch(API_BASE + '/api/modulo/gps', {
      headers: { Authorization: 'Bearer ' + (getToken() || '') }

          <div class="mod-badge ${online ? 'on' : 'off'}">${online ? 'EN LÍNEA' : 'OFFLINE'}</div>
        </div>
        ${row('Patente', v.patente)}
        ${row('Vehículo', v.marca_vehiculo)}
        ${row('Conductor', v.conductor)}
        ${v.velocidad !== undefined ? `<div class="mod-card-row"><div class="mod-label">Velocidad</div><div class="mod-value ${online ? 'online' : 'offline'}">${v.velocidad} km/h</div></div>` : ''}
        ${v.ultima_vez ? `<div class="mod-card-row"><div class="mod-label">Última actualización</div><div style="font-size:11px;color:var(--muted)">${new Date(v.ultima_vez).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div></div>` : ''}

      ${mapaUrl ? `<a href="${mapaUrl}" target="_blank" rel="noopener" style="text-decoration:none"><button class="mod-btn secondary">📍 Ver en Google Maps</button></a>` : ''}
    `
  } catch {
    document.getElementById('modulo-body').innerHTML = '<div class="mod-error">Error de conexión</div>'
  }

    }

    }

        <div class="mod-label" style="margin-bottom:8px">${domNombres[dom] || dom}</div>

          <div class="ha-device">

    }

async function toggleHogar(entityId, btn) {

async function confirmarPanico(tipo) {
  tipo = tipo || 'sonoro'
  if (panicoCooldown) return
  panicoCooldown = true
  document.getElementById('modulo-body').innerHTML = '<div class="mod-spinner">Enviando alerta...</div>'
  let lat = null, lng = null
  if (tipo === 'ayuda' && navigator.geolocation) {
    try {
      const pos = await new Promise((res,rej) => navigator.geolocation.getCurrentPosition(res,rej,{timeout:15000,enableHighAccuracy:true,maximumAge:0}))
      lat = pos.coords.latitude; lng = pos.coords.longitude
    } catch {}
  }
  try {
    const r = await fetch(API_BASE + '/api/modulo/panico', {
      method:'POST',
      headers:{ Authorization:'Bearer '+(getToken()||''), 'Content-Type':'application/json' },
      body: JSON.stringify({ tipo, lat, lng })
    })
    const d = await r.json()
    if (d.ok) {
      document.getElementById('modulo-body').innerHTML = `
        <div class="mod-card" style="border-color:rgba(16,185,129,.4);align-items:center;text-align:center;gap:14px">
          <div style="font-size:44px">✅</div>
          <div style="font-size:15px;font-weight:700;color:var(--green)">Alerta enviada</div>
          <div style="font-size:12px;color:var(--muted)">La central de monitoreo fue notificada</div>
          <button class="mod-btn secondary" onclick="cerrarModulo()" style="margin-top:4px;width:100%">Cerrar</button>
        </div>
      `
      setEstado('panico','PÁNICO'); beepPanic()
      if (navigator.vibrate) navigator.vibrate([300,100,300,100,300])
      // Auto-normalizar: re-consultar el estado real del panel luego de 90s
      setTimeout(async () => {
        try {
          const hdr = { Authorization: 'Bearer ' + (getToken() || '') }
          const r   = await fetch(API_BASE + '/api/modulo/alarma', { headers: hdr })
          const d   = await r.json()
          if (d.ok) {
            if      (d.estado === 'armado')    setEstado('armado','Armado')
            else if (d.estado === 'desarmado') setEstado('desarmado','Desarmado')
            else                               setEstado('armado','Armado') // fallback
          }
        } catch {}
      }, 90000)
    } else {
      document.getElementById('modulo-body').innerHTML = `<div class="mod-error">${d.error||'No se pudo enviar la alerta'}</div>`
      beepErr()
    }
  } catch {
    document.getElementById('modulo-body').innerHTML = '<div class="mod-error">Error de conexión</div>'
    beepErr()
  }
  setTimeout(() => { panicoCooldown = false }, 30000)
}

function hablarRespuesta(texto) {
  if (!ttsEnabled || !texto) {
    setAvatarState('idle')
    setWaveState('idle')
    actualizarBtnMic()
    return
  }
  window.speechSynthesis.cancel()
  const utter = new SpeechSynthesisUtterance(texto)
  utter.lang  = 'es-AR'
  utter.rate  = 1.05
  utter.pitch = 1.0
  utter.onstart = () => {
    setAvatarState('speaking')
    setWaveState('speaking')
  }
  utter.onboundary = (e) => {
    if (e.name === 'word') {
      // Pulso de amplitud por cada palabra
      voiceWave.target = 18 + Math.random() * 16
      voiceWave.freq   = 2.5 + Math.random() * 3
      // Decae suavemente hasta el próximo pulso
      clearTimeout(voiceWave._t)
      voiceWave._t = setTimeout(() => { voiceWave.target = 8 + Math.random() * 8 }, 120)
    }
  }
  utter.onend = () => {
    setAvatarState('idle')
    setWaveState('idle')
    actualizarBtnMic()
  }
  utter.onerror = () => {
    setAvatarState('idle')
    setWaveState('idle')
    actualizarBtnMic()
  }
  window.speechSynthesis.speak(utter)
}

// ════════════════════════════════════════════════════
//  VOZ — MediaRecorder → Groq Whisper
// ════════════════════════════════════════════════════
let mediaRecorder  = null
let audioChunks    = []
let grabando       = false
let ttsEnabled     = true       // TTS ON por defecto
let silenceTimer   = null
let audioCtx       = null
let analyser       = null
let micStream      = null

function actualizarBtnMic() {
  const btn = document.getElementById('btn-mic-in')
  if (!btn) return

    btn.textContent = '⏹ Escuchando...'

    btn.style.borderColor = 'rgba(139,92,246,.5)'
  }
}

function toggleMic() {
  if (grabando) mediaRecorder?.stop()
  else iniciarEscucha()
}

}


function detenerSilenceDetector() {
  if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null }
  if (analyser)     { analyser = null }
  if (audioCtx)     { try { audioCtx.close() } catch {} ; audioCtx = null }
}

function iniciarSilenceDetector(stream) {
  try {
    audioCtx  = new (window.AudioContext || window.webkitAudioContext)()
    analyser  = audioCtx.createAnalyser()
    analyser.fftSize = 512
    const src = audioCtx.createMediaStreamSource(stream)
    src.connect(analyser)
    const buf = new Uint8Array(analyser.frequencyBinCount)
    let silentMs = 0
    const UMBRAL    = 8    // nivel mínimo de sonido
    const SILENCIO  = 1800 // ms de silencio para cortar
    const MIN_AUDIO = 800  // ms mínimos grabando antes de cortar por silencio

    let startTime = Date.now()

    function checkSilence() {
      if (!grabando || !analyser) return
      analyser.getByteTimeDomainData(buf)
      let sum = 0
      for (let i = 0; i < buf.length; i++) sum += Math.abs(buf[i] - 128)
      const nivel = sum / buf.length

      if (nivel < UMBRAL) {
        silentMs += 100
        if (silentMs >= SILENCIO && (Date.now() - startTime) >= MIN_AUDIO) {
          mediaRecorder?.stop()
          return
        }
      } else {
        silentMs = 0
      }
      silenceTimer = setTimeout(checkSilence, 100)
    }
    silenceTimer = setTimeout(checkSilence, 100)
  } catch (e) {
    console.warn('[LIMA] Silence detector no disponible:', e.message)
  }
}

async function iniciarEscucha(retryCount = 0) {
  if (grabando) return
  if (!navigator.mediaDevices?.getUserMedia) {
    toast('Micrófono no disponible', 't-err'); return
  }
  // Release any lingering stream from previous recording before requesting new one
  if (micStream) { try { micStream.getTracks().forEach(t => t.stop()) } catch {} ; micStream = null }
  try {
    const stream   = await navigator.mediaDevices.getUserMedia({ audio: true })
    micStream      = stream
    const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/ogg','audio/mp4']
                       .find(t => MediaRecorder.isTypeSupported(t)) || ''
    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {})
    audioChunks   = []

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data) }

    let recStartTime = 0
    mediaRecorder.onstart = () => {
      grabando = true
      recStartTime = Date.now()
      setAvatarState('listening')
      actualizarBtnMic()
      if (navigator.vibrate) navigator.vibrate(50)
      iniciarSilenceDetector(stream)
    }

    mediaRecorder.onstop = async () => {
      grabando = false
      detenerSilenceDetector()
      stream.getTracks().forEach(t => t.stop())
      micStream = null
      actualizarBtnMic()

      const blob = new Blob(audioChunks, { type: mimeType || 'audio/webm' })
      const recDuration = Date.now() - recStartTime
      if (blob.size < 5000 || recDuration < 1200) {
        // Audio demasiado corto o vacío — evita alucinaciones de Whisper
        setAvatarState('idle')
        actualizarBtnMic()
        return
      }

      setAvatarState('processing')
      const fd = new FormData()
      fd.append('audio', blob, 'audio.webm')

      try {
        const r = await fetch(API_BASE + '/api/transcribir', {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + (getToken() || '') },
          body: fd
        })
        const d = await r.json()
        if (d.texto?.trim()) {
          inp.value = d.texto.trim()
          enviar()
        } else {
          setAvatarState('idle')
          actualizarBtnMic()
        }
      } catch {
        setAvatarState('idle')
        actualizarBtnMic()
        toast('Error al procesar audio', 't-err')
      }
    }

    mediaRecorder.start()
  } catch (e) {
    console.error('[MIC] Error:', e.name, e.message)
    if (e.name === 'NotAllowedError') {
      actualizarBtnMic()
      toast('Permiso de micrófono denegado', 't-err')
    } else if (e.name === 'NotFoundError') {
      actualizarBtnMic()
      toast('Sin micrófono', 't-err')
    } else if (e.name === 'NotReadableError') {
      // Mic is busy — auto-retry up to 3 times with increasing delay before showing error
      if (retryCount < 3) {
        const delay = (retryCount + 1) * 2500  // 2.5s, 5s, 7.5s
        console.warn('[MIC] NotReadableError, reintentando en', delay, 'ms (intento', retryCount + 1, 'de 3)')
        setTimeout(() => iniciarEscucha(retryCount + 1), delay)
        return
      }
      actualizarBtnMic()
      // Show message with retry button in chat (only after all retries failed)
      document.getElementById('chat-empty').style.display = 'none'
      const wrap = document.createElement('div'); wrap.className = 'msg lima'
      wrap.innerHTML = '<div class="msg-av" style="background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center">L</div>' +
        '<div class="msg-inner"><div class="msg-bubble" style="display:flex;flex-direction:column;gap:6px">' +
        '<span>Micrófono ocupado. Cerrá otras apps que usen el micrófono y reintentá.</span>' +
        '<button onclick="reintentarMic(this)" style="background:var(--p);color:#fff;border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:1px">🎙 REINTENTAR</button>' +
        '</div></div>'
      document.getElementById('chat').insertBefore(wrap, document.getElementById('typing'))
    } else {
      actualizarBtnMic()
      toast('Mic error: ' + e.name, 't-err')
    }
  }
}

// Reintentar mic desde botón en chat (después de NotReadableError)
function reintentarMic(btn) {
  if (btn) btn.disabled = true
  // Ensure previous stream is fully released before retrying
  if (micStream) { try { micStream.getTracks().forEach(t => t.stop()) } catch {} ; micStream = null }
  setTimeout(() => {
    iniciarEscucha()
  }, 1200)
}

//  LOGIN
// ════════════════════════════════════════════════════
async function hacerLogin() {
  const email = document.getElementById('l-email').value.trim()
  const pass  = document.getElementById('l-pass').value
  const err   = document.getElementById('login-err')
  const btn   = document.getElementById('btn-login')
  err.textContent = ''
  if(!email||!pass) { err.textContent='Completá email y contraseña'; return }
  btn.disabled=true
  const intentarLogin = async (intento) => {
    btn.textContent = intento === 1 ? 'VERIFICANDO...' : 'REINTENTANDO...'
    const ctrl = new AbortController()
    const tid  = setTimeout(() => ctrl.abort(), 8000)
    try {
      const r = await fetch(API_BASE + '/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass }),
        signal: ctrl.signal
      })
      clearTimeout(tid)
      const d = await r.json()
      if (!r.ok) { err.textContent = d.error || 'Email o contraseña incorrectos'; return false }
      localStorage.setItem(TK, d.token)
      localStorage.setItem(UK, JSON.stringify(d.usuario))
      localStorage.setItem(MK, JSON.stringify(d.modulos || []))
      if (window.LimaAndroid) window.LimaAndroid.saveToken(d.token)
      document.getElementById('login').classList.add('hide')
      iniciar()
      return true
    } catch (e) {
      clearTimeout(tid)
      if (e.name === 'AbortError') {
        err.textContent = intento < 2 ? 'Sin respuesta, reintentando...' : 'Servidor no responde. Verificá tu conexión.'
      } else if (!navigator.onLine) {
        err.textContent = 'Sin conexión a internet.'
        return false  // no reintentar si no hay red
      } else {
        err.textContent = intento < 2 ? 'Error de red, reintentando...' : 'No se pudo conectar al servidor.'
      }
      return false
    }
  }
  try {
    const ok = await intentarLogin(1)
    if (!ok && err.textContent.includes('reintentando')) {
      await new Promise(r => setTimeout(r, 2500))
      await intentarLogin(2)
    }
  } finally {
    btn.disabled = false; btn.textContent = 'INGRESAR'
  }
}
function logout() { localStorage.clear(); location.reload() }

      if (ttsEnabled) {
        window.speechSynthesis.cancel()
        const utter = new SpeechSynthesisUtterance(`Hola${nombre?' '+nombre:''}, soy LIMA. ¿En qué puedo ayudarte?`)
        utter.lang = 'es-AR'; utter.rate = 1.05
        utter.onstart = () => { setAvatarState('speaking'); setWaveState('speaking') }
        utter.onend = () => {
          setAvatarState('idle'); setWaveState('idle')
          actualizarBtnMic()
        }
        window.speechSynthesis.speak(utter)
      }
    }, 800)
  }
  // Pending widget action (cold start from widget)
  setTimeout(() => {
    if (window.LimaAndroid) {
      const pa = LimaAndroid.getPendingWidgetAction()
      if (pa) window.limaWidgetAction(pa)
    }
  }, 300)
}

// Release mic when app goes to background (prevents "NotReadableError" on resume)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    if (grabando && mediaRecorder) { try { mediaRecorder.stop() } catch {} }
    if (micStream) { try { micStream.getTracks().forEach(t => t.stop()) } catch {} ; micStream = null }
  }
})

// Input
inp.addEventListener('input', function() {
  this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,80)+'px'
})
inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar()} })
document.getElementById('l-pass').addEventListener('keydown',  e=>{ if(e.key==='Enter') hacerLogin() })

// ── WIDGET ACTIONS (llamadas desde Android native via evaluateJavascript) ──
window.limaWidgetAction = function(accion) {
  if (!getToken()) { hacerLogin(); return }  // sin sesión → ir al login
  if (accion === 'ayuda') {
    // Asegurarse de que la pantalla principal esté visible
    document.getElementById('login').classList.add('hide')
    seleccionarPanico('ayuda')  // va directo a la confirmación
  } else if (accion === 'escuchar') {
    document.getElementById('login').classList.add('hide')
    if (!grabando) iniciarEscucha()
  }
}
document.getElementById('l-email').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('l-pass').focus() })

// Auto-arranque si hay token
if(getToken()) {
  // Verificar token y refrescar datos del usuario antes de iniciar
  fetch(API_BASE + '/api/me', { headers: { Authorization: 'Bearer ' + getToken() } })
    .then(r => {
      if (!r.ok) { localStorage.clear(); return }
      return r.json()
    })
    .then(d => {
      if (!d) return
      // Actualizar localStorage con datos frescos del servidor
      localStorage.setItem(UK, JSON.stringify(d.usuario))
      localStorage.setItem(MK, JSON.stringify(d.modulos || []))
      document.getElementById('login').classList.add('hide')
      iniciar()
    })
    .catch(() => { localStorage.clear(); location.reload() })
}

// ── PWA Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {})
  })
}

// ── PWA: prompt de instalación (Android) ──
let deferredPrompt = null
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault()
  deferredPrompt = e
  // Mostrar botón de instalar en el header si está disponible
  const btn = document.createElement('button')
  btn.id = 'btn-install'
  btn.title = 'Instalar app'
  btn.style.cssText = 'background:none;border:1px solid rgba(139,92,246,.4);color:#c084fc;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;margin-top:4px'
  btn.textContent = '⬇'
  btn.onclick = () => {
    deferredPrompt.prompt()
    deferredPrompt.userChoice.then(() => { btn.remove(); deferredPrompt = null })
  }
  const hdrBtns = document.querySelector('#hdr-right div')
  if (hdrBtns) hdrBtns.prepend(btn)
})
</script>
</body>
